        <!-- SWUP -->
        <script type="module">
        import Swup from 'https://unpkg.com/swup@4?module';
        import SwupHeadPlugin from 'https://unpkg.com/@swup/head-plugin@2?module';

        const swup = new Swup({
            plugins: [new SwupHeadPlugin()]
        });

        // Run scripts once on first page load
        initPageScripts();

        // Run again after every Swup page change
        swup.hooks.on('page:view', () => {
            console.log("Swup page:view hook triggered");
            initPageScripts();
        });
        </script>
        <!-- SMOOTH SCROLLING -->
        <script src="https://unpkg.com/@studio-freight/lenis/bundled/lenis.min.js"></script>
        <script>
        const lenis = new Lenis({
            duration: 1.2, // smoothness
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) // custom easing
        })

        function raf(time) {
            lenis.raf(time)
            requestAnimationFrame(raf)
        }

        requestAnimationFrame(raf)
        </script>
