<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!--FONTS-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&family=Noto+Sans+JP:wght@100..900&family=Zen+Kaku+Gothic+New&display=swap" rel="stylesheet">
  <!-- SWIPING FUNCTIONALITY-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper/swiper-bundle.min.css"/>
  <!-- STYLES -->
  <link rel="stylesheet" href="index-style.css">
  <link rel="stylesheet" href="general-style.css">
  <!-- TITLE -->
  <title>RUFUS DESIGN - HOME</title>
</head>

<body>
  <!-- MAIN -->
  <main id="swup" class="transition-fade">
    <!--HERO SECTION-->
    <section class="hero">
          <video  id="hero-video-desktop" autoplay muted playsinline onended="handleVideoEnd()" 
                  style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:10; pointer-events:none;">
            <source src="Images/Hero section backgrounds/RUFUS-BLACK.mp4" type="video/webm"> 
          </video>

           <video  id="hero-video-mobile" autoplay muted playsinline onended="handleVideoEnd()" 
                  style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:10; pointer-events:none;">
            <source src="Images/Hero section backgrounds/RUFUS-BLACK-MOBILE.mp4" type="video/webm">
          </video>
    </section>

    <!-- SCRIPT -->
    <script src="script.js"></script>

    <script type="module">
      import Swup from 'https://unpkg.com/swup@4?module';
      import SwupHeadPlugin from 'https://unpkg.com/@swup/head-plugin@2?module';

      const swup = new Swup({
        plugins: [new SwupHeadPlugin()]
      });

      // Run scripts once on first page load
      initPageScripts();

      // Run again after every Swup page change
      swup.hooks.on('page:view', () => {
        console.log("Swup page:view hook triggered");
        initPageScripts();
      });
    </script>
    <script src="https://unpkg.com/@studio-freight/lenis/bundled/lenis.min.js"></script>
    <script>
      const lenis = new Lenis({
        duration: 1.2, // smoothness
        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)) // custom easing
      })

      function raf(time) {
        lenis.raf(time)
        requestAnimationFrame(raf)
      }

      requestAnimationFrame(raf)
    </script>

    <!-- JUMP TO OVERVIEW AUTOMATICALLY -->
    <script>
    function handleVideoEnd() {
      window.location.href = "/overview.html";
    }
    </script>
    
  </main>
</body>
</html>
